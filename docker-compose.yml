version: "3.8"

services:
  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    restart: unless-stopped

  room-service:
    build: ./room-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
    restart: unless-stopped

  booking-service:
    build: ./booking-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
    restart: unless-stopped

# Add databases (like MongoDB, PostgreSQL, or Redis) down here later!
